<svg xmlns="http://www.w3.org/2000/svg" viewBox="-40 0 1110 300" font-family="Georgia, serif" font-size="24" font-style="italic">

  <!-- ===== LEFT: Y-Z plane ===== -->

  <!-- FOV half-cone fill -->
  <polygon points="60,140 300,70 300,140" fill="#ddeeff" opacity="0.8"/>

  <!-- Y-axis -->
  <line x1="60" y1="145" x2="60" y2="35" stroke="#aaa" stroke-width="1.2"/>
  <polygon points="60,30 56,42 64,42" fill="#aaa"/>
  <text x="68" y="34" fill="#aaa">y</text>

  <!-- Z-axis (dashed) -->
  <line x1="40" y1="140" x2="330" y2="140" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,4"/>
  <polygon points="330,140 318,136 318,144" fill="#aaa"/>
  <text x="337" y="149" fill="#aaa">z</text>

  <!-- Bottom ray (dashed) -->
  <line x1="60" y1="140" x2="300" y2="210" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Top ray -->
  <line x1="60" y1="140" x2="300" y2="70" stroke="#333" stroke-width="1.8"/>

  <!-- Near plane -->
  <line x1="300" y1="55" x2="300" y2="225" stroke="#2471a3" stroke-width="2.5"/>

  <!-- Camera dot -->
  <circle cx="60" cy="140" r="4.5" fill="#222"/>
  <text x="60" y="170" text-anchor="middle" fill="#444">caméra</text>

  <!-- Right angle marker -->
  <path d="M 300,130 L 290,130 L 290,140" fill="none" stroke="#888" stroke-width="1.2"/>

  <!-- Angle sector θ/2 -->
  <path d="M 60,140 L 110,140 A 50,50 0 0,0 108,126 Z" fill="#c0392b" opacity="0.25"/>
  <path d="M 110,140 A 50,50 0 0,0 108,126" fill="none" stroke="#c0392b" stroke-width="1.8"/>
  <text x="115" y="116" fill="#c0392b">θ/2</text>

  <!-- z_n horizontal dimension -->
  <line x1="60" y1="232" x2="300" y2="232" stroke="#666" stroke-width="1"/>
  <line x1="60" y1="226" x2="60" y2="238" stroke="#666" stroke-width="1"/>
  <line x1="300" y1="226" x2="300" y2="238" stroke="#666" stroke-width="1"/>
  <text x="180" y="262" text-anchor="middle" fill="#555">z<tspan dy="5" font-size="16" font-style="normal">n</tspan></text>

  <!-- Half-height dimension -->
  <line x1="307" y1="70" x2="320" y2="70" stroke="#666" stroke-width="1"/>
  <line x1="307" y1="140" x2="320" y2="140" stroke="#666" stroke-width="1"/>
  <line x1="313" y1="70" x2="313" y2="140" stroke="#666" stroke-width="1"/>
  <text x="326" y="113" fill="#555">z<tspan dy="5" font-size="16" font-style="normal">n</tspan><tspan dy="-5"> tan(θ/2)</tspan></text>

  <!-- Near plane label -->
  <text x="300" y="48" text-anchor="middle" fill="#2471a3">plan proche</text>


  <!-- ===== RIGHT: X-Z plane (offset by 560) ===== -->

  <!-- FOV half-cone fill -->
  <polygon points="620,140 860,50 860,140" fill="#ddeeff" opacity="0.8"/>

  <!-- X-axis -->
  <line x1="620" y1="145" x2="620" y2="35" stroke="#aaa" stroke-width="1.2"/>
  <polygon points="620,30 616,42 624,42" fill="#aaa"/>
  <text x="628" y="34" fill="#aaa">x</text>

  <!-- Z-axis (dashed) -->
  <line x1="600" y1="140" x2="890" y2="140" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,4"/>
  <polygon points="890,140 878,136 878,144" fill="#aaa"/>
  <text x="897" y="149" fill="#aaa">z</text>

  <!-- Bottom ray (dashed) -->
  <line x1="620" y1="140" x2="860" y2="230" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Top ray -->
  <line x1="620" y1="140" x2="860" y2="50" stroke="#333" stroke-width="1.8"/>

  <!-- Near plane -->
  <line x1="860" y1="40" x2="860" y2="240" stroke="#2471a3" stroke-width="2.5"/>

  <!-- Camera dot -->
  <circle cx="620" cy="140" r="4.5" fill="#222"/>
  <text x="620" y="170" text-anchor="middle" fill="#444">caméra</text>

  <!-- Right angle marker -->
  <path d="M 860,130 L 850,130 L 850,140" fill="none" stroke="#888" stroke-width="1.2"/>

  <!-- z_n horizontal dimension -->
  <line x1="620" y1="248" x2="860" y2="248" stroke="#666" stroke-width="1"/>
  <line x1="620" y1="242" x2="620" y2="254" stroke="#666" stroke-width="1"/>
  <line x1="860" y1="242" x2="860" y2="254" stroke="#666" stroke-width="1"/>
  <text x="740" y="278" text-anchor="middle" fill="#555">z<tspan dy="5" font-size="16" font-style="normal">n</tspan></text>

  <!-- Half-width dimension -->
  <line x1="867" y1="50" x2="880" y2="50" stroke="#666" stroke-width="1"/>
  <line x1="867" y1="140" x2="880" y2="140" stroke="#666" stroke-width="1"/>
  <line x1="873" y1="50" x2="873" y2="140" stroke="#666" stroke-width="1"/>
  <text x="886" y="101" fill="#555">a·z<tspan dy="5" font-size="16" font-style="normal">n</tspan><tspan dy="-5"> tan(θ/2)</tspan></text>

  <!-- Near plane label -->
  <text x="860" y="33" text-anchor="middle" fill="#2471a3">plan proche</text>


</svg>
